<!DOCTYPE html>
<html>
<head>
<title>Events</title>

<script>
function changeColor(){
document.getElementById("box").style.background="yellow";
}
</script>

</head>

<body>

<div id="box" 
style="width:200px;height:100px;background:lightblue"
onmouseover="changeColor()">
Move Mouse Here
</div>

</body>
</html>
